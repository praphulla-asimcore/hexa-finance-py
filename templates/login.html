<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hexa Finance — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"/>
<style>{% include "css/login.css" %}</style>
</head>
<body class="login-body">

<div class="login-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <img src="/hexa-logo.png" alt="HEXA" style="height:36px;filter:drop-shadow(0 0 14px rgba(233,30,140,0.7))"/>
      <div>
        <div class="login-brand-name">Finance</div>
        <div class="login-brand-sub">hexamatics.finance</div>
      </div>
    </div>

    <h1 class="login-title">Sign in</h1>
    <p class="login-subtitle">Enter your invited email address to access the portal</p>

    <form method="POST" action="/login" class="login-form">
      {% if error %}
      <div class="error-msg" style="margin-bottom:16px">{{ error }}</div>
      {% endif %}

      <div class="login-field">
        <label class="label" for="email">Email address</label>
        <input id="email" type="email" name="email" class="input" placeholder="you@hexamatics.com" required autofocus autocomplete="email"/>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">
        Sign in
      </button>
    </form>

    <p class="login-footer">Invite-only · no public sign-up · Hexamatics Sdn Bhd</p>
  </div>
</div>
</body>
</html>
