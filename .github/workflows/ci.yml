name: Smoke Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      # Local mode only — pytest starts its own uvicorn with the DB env blanked.
      # PLAYWRIGHT_BASE_URL is intentionally unset, so CI never hits production.
      - name: Run smoke tests
        run: python -m pytest
